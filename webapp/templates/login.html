<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Frisco Admin — Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #1a2e45; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .card { border: none; border-radius: 12px; box-shadow: 0 8px 32px rgba(0,0,0,0.4); }
    .card-header { background: #1F4E79; color: #fff; border-radius: 12px 12px 0 0 !important; }
    .btn-primary { background: #1F4E79; border-color: #1F4E79; }
    .btn-primary:hover { background: #163a5c; border-color: #163a5c; }
  </style>
</head>
<body>
  <div class="card" style="width:360px;">
    <div class="card-header text-center py-4">
      <h4 class="mb-0">🏠 Frisco Admin</h4>
    </div>
    <div class="card-body p-4">
      {% with msgs = get_flashed_messages() %}
        {% if msgs %}
          <div class="alert alert-danger py-2">{{ msgs[0] }}</div>
        {% endif %}
      {% endwith %}
      <form method="POST">
        <div class="mb-3">
          <label class="form-label fw-semibold">Username</label>
          <input type="text" name="username" class="form-control" autofocus required>
        </div>
        <div class="mb-4">
          <label class="form-label fw-semibold">Password</label>
          <input type="password" name="password" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-primary w-100">Sign In</button>
      </form>
    </div>
  </div>
</body>
</html>
